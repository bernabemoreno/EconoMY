<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/><title>EconoMy</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"/></head><body><div id="game"><canvas id="map"></canvas><div id="routes"></div><div id="vehicles"></div><div id="buildings"></div><div id="fx"></div><header class="hud"><div class="chip coin">🪙 <b id="money">0</b></div><div class="chip level">⭐ <b id="level">1</b><span id="xp">0/100</span></div><button id="resetBtn" class="icon-btn">↻</button></header><div id="goal" class="goal">Objetivo</div><section id="info" class="info hidden"></section><section id="buildPanel" class="sheet hidden"><div class="sheet-head"><b>Construir</b><button data-close="buildPanel">×</button></div><div id="buildList" class="list"></div></section><section id="upgradePanel" class="sheet hidden"><div class="sheet-head"><b>Mejoras</b><button data-close="upgradePanel">×</button></div><div id="upgradeList" class="list"></div></section><footer class="bar"><button id="routeModeBtn">🔗<span>Rutas</span></button><button id="buildBtn">🏗️<span>Construir</span></button><button id="upgradeBtn">⬆️<span>Mejoras</span></button><button id="expandBtn">🗺️<span>Expandir</span></button></footer><div id="toast" class="toast hidden"></div></div><script src="game.js?v=3"></script></body></html>
