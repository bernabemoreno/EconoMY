<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EconoMy - Map Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="clearRoutes" title="Borrar rutas">⚙️</button>
      <div class="counter"><span>💰</span><strong id="money">0</strong></div>
      <div class="counter"><span>🌽</span><strong id="corn">0</strong></div>
      <div class="counter"><span>🍅</span><strong id="tomato">0</strong></div>
      <div class="counter"><span>🥛</span><strong id="milk">0</strong></div>
    </header>

    <main class="game-wrap">
      <canvas id="game" width="900" height="1400"></canvas>

      <div class="help">
        <strong>EconoMy</strong>
        <span>Arrastrá desde una fábrica al mercado para vender.</span>
      </div>
    </main>

    <footer class="bottom">
      <button class="tab active">🏦 Mercado</button>
      <button class="tab">🛣 Rutas</button>
      <button class="tab">📦 Stock</button>
      <button class="tab">⬆️ Mejoras</button>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
