<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>EconoMy 0.1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameShell">
    <canvas id="gameCanvas"></canvas>

    <div class="hud top">
      <div class="pill money">🪙 <strong id="money">0</strong></div>
      <div class="pill level">⭐ <strong>1</strong><span>180 / 500</span></div>
      <button id="menuBtn" class="menu">☰</button>
    </div>

    <section id="selectedPanel" class="selected-panel hidden">
      <h2 id="selectedName">Edificio</h2>
      <div id="selectedData"></div>
    </section>

    <section class="how">
      <h2>Cómo jugar</h2>
      <div class="steps">
        <article><b>1</b><span>tocá un edificio</span></article>
        <article><b>2</b><span>arrastrá hasta otro</span></article>
        <article><b>3</b><span>los recursos viajan solos</span></article>
      </div>
    </section>

    <footer class="bottom">
      <button class="tab active">🏪<span>Mercado</span></button>
      <button class="tab">🔗<span>Rutas</span></button>
      <button class="tab">⬆️<span>Mejoras</span></button>
      <button class="tab">📦<span>Almacén</span></button>
    </footer>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
